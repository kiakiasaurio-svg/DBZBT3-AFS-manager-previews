name: Build

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    name: Windows x64 (MSVC, Qt ${{ matrix.qt_version }})
    runs-on: windows-2022

    strategy:
      fail-fast: false
      matrix:
        qt_version: [ "5.15.2" ]
        build_type: [ "Release" ]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: ${{ matrix.qt_version }}
          arch: win64_msvc2019_64
          cache: true

      - name: Configure CMake (write Qt path file)
        shell: bash
        run: |
          echo "${{ env.QT_ROOT_DIR }}" > CMakeQtPathWindowsMSVCx64.txt
          cat CMakeQtPathWindowsMSVCx64.txt

      - name: Configure project
        shell: bash
        run: |
          mkdir build
          cd build
          cmake -G "Visual Studio 17 2022" -A x64 -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} ..

      - name: Build
        shell: bash
        run: |
          cmake --build build --config ${{ matrix.build_type }}

      - name: Deploy Qt runtime dependencies
        shell: bash
        run: |
          OUT_DIR="Binaries/Windows/${{ matrix.build_type }}/MSVC/x64"
          if [ -d "$OUT_DIR/${{ matrix.build_type }}" ]; then
            OUT_DIR="$OUT_DIR/${{ matrix.build_type }}"
          fi
          for exe in "$OUT_DIR"/*.exe; do
            [ -f "$exe" ] && "${{ env.QT_ROOT_DIR }}/bin/windeployqt.exe" "$exe" --no-translations
          done

      - name: Upload binaries
        uses: actions/upload-artifact@v4
        with:
          name: AFS-Manager-windows-x64-${{ matrix.build_type }}
          path: |
            Binaries/Windows/${{ matrix.build_type }}/MSVC/x64/**
            Binaries/Windows/${{ matrix.build_type }}/MSVC/x64/${{ matrix.build_type }}/**
          if-no-files-found: warn
